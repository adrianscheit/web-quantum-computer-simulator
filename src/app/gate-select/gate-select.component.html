<label>
  Gate:
  <select (change)="change(eventTargetValue($event))">
    <option disabled [selected]="!gate"></option>
    @for (g of gates; track g) {
      <option [value]="g.name" [selected]="gate===g">
        {{g.name}} - {{g.desc}}
      </option>
    }
  </select>
</label>
@if (gate) {
  <app-gate-view [gate]="gate"></app-gate-view>
}
